services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-rag-app
    working_dir: /workspace
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
    environment:
      APP_NAME: Agentic RAG
      APP_ENV: dev
      DEBUG: "true"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentic-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data: