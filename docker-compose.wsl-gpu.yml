services:
  app:
    command: bash -lc "ldconfig && fastapi dev app/main.py --host 0.0.0.0 --port 8000"
    devices:
      - /dev/dxg:/dev/dxg
    volumes:
      - /usr/lib/wsl:/usr/lib/wsl:ro
      - /etc/OpenCL/vendors:/etc/OpenCL/vendors:ro
      - /usr/lib/x86_64-linux-gnu/intel-opencl:/usr/lib/x86_64-linux-gnu/intel-opencl:ro
      - /usr/lib/x86_64-linux-gnu/libze_intel_gpu.so.1.14.37020:/usr/lib/x86_64-linux-gnu/libze_intel_gpu.so.1.14.37020:ro
      - /usr/lib/x86_64-linux-gnu/libze_intel_gpu.so.1:/usr/lib/x86_64-linux-gnu/libze_intel_gpu.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libigdfcl.so.2.28.4+0:/usr/lib/x86_64-linux-gnu/libigdfcl.so.2.28.4+0:ro
      - /usr/lib/x86_64-linux-gnu/libigdfcl.so.2:/usr/lib/x86_64-linux-gnu/libigdfcl.so.2:ro
      - /usr/lib/x86_64-linux-gnu/libopencl-clang.so.16:/usr/lib/x86_64-linux-gnu/libopencl-clang.so.16:ro
    environment:
      LD_LIBRARY_PATH: /usr/lib/wsl/lib:/usr/lib/x86_64-linux-gnu/intel-opencl:/usr/lib/x86_64-linux-gnu
